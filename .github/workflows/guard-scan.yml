# Guard Scan — scan prompt files in the repo against the AegisAI Guard API on every PR.
# Copyright (C) 2024 Sarthak Doshi (github.com/SdSarthak)
# SPDX-License-Identifier: AGPL-3.0-only
#
# How it works:
#   1. Finds all files matching `.prompts/**/*.txt` in the repo.
#   2. POSTs each file's content to $AEGISAI_GUARD_URL/api/v1/guard/scan
#      with Authorization: Bearer $AEGISAI_API_TOKEN.
#   3. If any response has decision="block", fails the workflow and posts
#      the matched_patterns in a PR comment.
#   Secrets needed: AEGISAI_GUARD_URL, AEGISAI_API_TOKEN (set in repo settings).

name: Guard Scan

on:
  pull_request:
    paths:
      - ".prompts/**"

jobs:
  scan:
    name: Scan prompt files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Scan prompt files
        run: python scripts/scan_prompts.py
        env:
          AEGISAI_GUARD_URL: ${{ secrets.AEGISAI_GUARD_URL }}
          AEGISAI_API_TOKEN: ${{ secrets.AEGISAI_API_TOKEN }}

      - name: Comment scan results on PR
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_BODY=$(python scripts/format_scan_comment.py)
          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY" || echo "Failed to post PR comment"
