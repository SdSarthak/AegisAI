name: Kubernetes Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**/*.yaml"
      - "infra/**/*.yml"
      - ".github/workflows/kubernetes-validation.yml"
  push:
    branches: [main, dev]
    paths:
      - "infra/**/*.yaml"
      - "infra/**/*.yml"
      - ".github/workflows/kubernetes-validation.yml"

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Kubernetes YAML can be decoded
        run: kubectl apply --dry-run=client --validate=false -f infra/
