name: Kubernetes Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**/*.yaml"
      - "infra/**/*.yml"
      - ".github/workflows/kubernetes-validation.yml"
  push:
    branches: [main, dev]
    paths:
      - "infra/**/*.yaml"
      - "infra/**/*.yml"
      - ".github/workflows/kubernetes-validation.yml"

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install YAML parser
        run: python -m pip install PyYAML

      - name: Validate Kubernetes manifests
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          manifest_paths = sorted(Path("infra").glob("*.y*ml"))
          if not manifest_paths:
              print("No Kubernetes manifests found in infra/")
              sys.exit(1)

          errors = []
          for path in manifest_paths:
              with path.open("r", encoding="utf-8") as handle:
                  for index, document in enumerate(yaml.safe_load_all(handle), start=1):
                      if document is None:
                          continue
                      if not isinstance(document, dict):
                          errors.append(f"{path} document {index}: expected mapping")
                          continue
                      for field in ("apiVersion", "kind", "metadata"):
                          if field not in document:
                              errors.append(f"{path} document {index}: missing {field}")
                      metadata = document.get("metadata")
                      if not isinstance(metadata, dict) or not metadata.get("name"):
                          errors.append(f"{path} document {index}: missing metadata.name")

          if errors:
              print("\n".join(errors))
              sys.exit(1)

          print(f"Validated {len(manifest_paths)} Kubernetes manifest file(s).")
          PY
