apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisai-backend
  labels:
    app: aegisai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegisai-backend
  template:
    metadata:
      labels:
        app: aegisai-backend
    spec:
      # -----------------------------------------------------------------
      # 1. FIXED KUBELINTER RULE: Pod Anti-Affinity added for multi-replica
      # -----------------------------------------------------------------
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: aegisai-backend
      
      initContainers:
      - name: model-download
        # -----------------------------------------------------------------
        # 2. FIXED KUBELINTER RULE: Pinned image tag instead of latest
        # -----------------------------------------------------------------
        image: python:3.11.9-slim
        # -----------------------------------------------------------------
        # 3. FIXED KUBELINTER RULE: Added CPU/Memory limits & requests
        # -----------------------------------------------------------------
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        command:
        - sh
        - "-c"
        - |
          pip install --no-cache-dir transformers torch sentencepiece
          python - <<'PY'
          import os
          from transformers import AutoModel, AutoTokenizer

          MODEL = "microsoft/deberta-v3-small"
          target_dir = "/app/models"

          print(f"Starting native cache generation for {MODEL} into {target_dir}...")
          
          # Prefetch fully valid weights and tokenizer structures natively
          AutoTokenizer.from_pretrained(MODEL, cache_dir=target_dir)
          AutoModel.from_pretrained(MODEL, cache_dir=target_dir)

          print("Model weights and structural vocabularies downloaded successfully.")
          PY
        volumeMounts:
        - name: model-storage
          mountPath: /app/models

      containers:
      - name: aegisai-backend
        # -----------------------------------------------------------------
        # 4. FIXED KUBELINTER RULE: Fixed main container latest tag block
        # -----------------------------------------------------------------
        image: aegisai-backend:v1.2.3
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: aegisai-config
        - secretRef:
            name: aegisai-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10    
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: faiss-storage
          mountPath: /app/faiss_index
        - name: model-storage
          mountPath: /app/models

      volumes:
      - name: faiss-storage
        persistentVolumeClaim:
          claimName: faiss-pvc
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aegisai-backend
  labels:
    app: aegisai-backend
spec:
  selector:
    app: aegisai-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faiss-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegisai-config
data:
  APP_NAME: "AegisAI"
  DEBUG: "false"
  API_V1_PREFIX: "/api/v1"
  GUARD_SANITIZATION_LEVEL: "medium"
  GUARD_MAX_PROMPT_LENGTH: "2000"
  LLM_MODEL: "gpt-4o-mini"
  FAISS_INDEX_PATH: "/app/faiss_index"
  RAG_CHUNK_SIZE: "1000"
  RAG_CHUNK_OVERLAP: "200"