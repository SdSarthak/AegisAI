apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisai-backend
  labels:
    app: aegisai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegisai-backend
  template:
    metadata:
      labels:
        app: aegisai-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # FIX 1: Added Pod Anti-Affinity to satisfy high-availability checks
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: aegisai-backend
              topologyKey: kubernetes.io/hostname

      initContainers:
      - name: model-download
        image: python:3.11-slim
        command:
        - sh
        - "-c"
        - |
          pip install --no-cache-dir transformers torch sentencepiece
          python - <<'PY'
          import os
          from transformers import AutoModel, AutoTokenizer

          MODEL = "microsoft/deberta-v3-small"
          target_dir = "/app/models"

          print(f"Starting native cache generation for {MODEL} into {target_dir}...")
          
          # Prefetch fully valid weights and tokenizer structures natively
          AutoTokenizer.from_pretrained(MODEL, cache_dir=target_dir)
          AutoModel.from_pretrained(MODEL, cache_dir=target_dir)

          print("Model weights and structural vocabularies downloaded successfully.")
          PY
        # FIX 2: Enforced Read-Only Root Filesystem for init container
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
        # FIX 3: Added writable /tmp volume mount
        - name: tmp-volume
          mountPath: /tmp

      containers:
      - name: aegisai-backend
        image: aegisai-backend:v1.0.0
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: aegisai-config
        - secretRef:
            name: aegisai-secrets
        # FIX 4: Enforced Read-Only Root Filesystem for backend container
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10    
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: faiss-storage
          mountPath: /app/faiss_index
        - name: model-storage
          mountPath: /app/models
        # FIX 5: Added writable /tmp volume mount for runtime processing
        - name: tmp-volume
          mountPath: /tmp

      volumes:
      - name: faiss-storage
        persistentVolumeClaim:
          claimName: faiss-pvc
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-pvc
      # FIX 6: Declared emptyDir volume for writable temporary filesystem access
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aegisai-backend
  labels:
    app: aegisai-backend
spec:
  selector:
    app: aegisai-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faiss-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegisai-config
data:
  APP_NAME: "AegisAI"
  DEBUG: "false"
  API_V1_PREFIX: "/api/v1"
  GUARD_SANITIZATION_LEVEL: "medium"
  GUARD_MAX_PROMPT_LENGTH: "2000"
  LLM_MODEL: "gpt-4o-mini"
  FAISS_INDEX_PATH: "/app/faiss_index"
  RAG_CHUNK_SIZE: "1000"
  RAG_CHUNK_OVERLAP: "200"